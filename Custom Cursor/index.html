<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Cursor Fixed</title>
    <style>
      :root {
        --c-accent: #9b59ff;
        --c-accent2: #ff59f8;
        --transition: ease-out;
      }

      body {
        cursor: none;
        background-color: #0f0f0f;
        height: 100vh;
        margin: 0;
      }

      #cursor-dot {
        position: fixed;
        width: 8px;
        height: 8px;
        background: var(--c-accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition: background 0.3s;
        box-shadow: 0 0 10px var(--c-accent);
      }

      #cursor-ring {
        position: fixed;
        width: 36px;
        height: 36px;
        border: 1.5px solid var(--c-accent);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition:
          width 0.3s var(--transition),
          height 0.3s var(--transition),
          border-color 0.3s,
          opacity 0.3s;
        opacity: 0.6;
      }

      #cursor-ring.hovering {
        width: 60px;
        height: 60px;
        border-color: var(--c-accent2);
        opacity: 1;
        background: rgba(155, 89, 255, 0.15);
      }

      .container {
        padding: 50px;
        text-align: center;
      }

      button {
        padding: 10px 20px;
        cursor: none;
      }
    </style>
  </head>

  <body>
    <div id="cursor-dot"></div>
    <div id="cursor-ring"></div>

    <div class="container">
      <h1 style="color: white">Hover over the button!</h1>
      <button class="filter-btn">Hover Me</button>
    </div>

    <script>
      const dot = document.querySelector("#cursor-dot");
      const ring = document.querySelector("#cursor-ring");

      let mx = -100,
        my = -100;
      let rx = -100,
        ry = -100;

      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
      });

      function animateCursor() {
        rx += (mx - rx) * 0.15;
        ry += (my - ry) * 0.15;

        dot.style.left = mx + "px";
        dot.style.top = my + "px";

        ring.style.left = rx + "px";
        ring.style.top = ry + "px";

        requestAnimationFrame(animateCursor);
      }

      animateCursor();

      document.addEventListener("mouseover", (e) => {
        if (
          e.target.closest("a, button, .project-card, .skill-card, .filter-btn")
        ) {
          ring.classList.add("hovering");
        } else {
          ring.classList.remove("hovering");
        }
      });
    </script>
  </body>
</html>
