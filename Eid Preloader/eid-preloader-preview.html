<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anasi Mart — Eid Preloader Preview</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        background: #000;
      }
      /* Reset all children */
      #am-preloader *,
      #am-preloader *::before,
      #am-preloader *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      #am-preloader {
        --am-gold: #d4af37;
        --am-gold-light: #f5e6a3;
        --am-gold-dim: rgba(212, 175, 55, 0.15);
        --am-emerald: #10b981;
        --am-emerald-dim: rgba(16, 185, 129, 0.12);
        --am-bg-deep: #050d1a;
        --am-bg-mid: #0a1628;
        --am-text: #f0e6c8;
        --am-text-dim: rgba(240, 230, 200, 0.5);
        --am-font-display: "Cinzel", serif;
        --am-font-body: "Cormorant Garamond", serif;

        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: radial-gradient(
          ellipse 80% 80% at 50% 40%,
          #0d1f3c 0%,
          #071428 45%,
          var(--am-bg-deep) 100%
        );
        opacity: 1;
        transition:
          opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
          visibility 0.7s ease;
        will-change: opacity;
      }

      #am-preloader.am-hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      .am-geo {
        position: absolute;
        inset: 0;
        opacity: 1;
      }
      .am-geo-svg {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .am-particles {
        position: absolute;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }
      .am-p {
        position: absolute;
        color: var(--am-gold);
        font-size: 10px;
        opacity: 0;
        will-change: transform, opacity;
        animation: am-float 6s ease-in-out infinite;
      }
      .am-p1 {
        left: 8%;
        top: 75%;
        animation-delay: 0s;
        animation-duration: 7s;
        font-size: 8px;
      }
      .am-p2 {
        left: 18%;
        top: 60%;
        animation-delay: 0.8s;
        animation-duration: 9s;
        font-size: 6px;
      }
      .am-p3 {
        left: 28%;
        top: 85%;
        animation-delay: 1.6s;
        animation-duration: 8s;
        font-size: 5px;
        color: var(--am-emerald);
      }
      .am-p4 {
        left: 38%;
        top: 70%;
        animation-delay: 2.4s;
        animation-duration: 10s;
        font-size: 9px;
      }
      .am-p5 {
        left: 52%;
        top: 80%;
        animation-delay: 0.4s;
        animation-duration: 7.5s;
        font-size: 5px;
        color: var(--am-emerald);
      }
      .am-p6 {
        left: 62%;
        top: 65%;
        animation-delay: 1.2s;
        animation-duration: 8.5s;
        font-size: 7px;
      }
      .am-p7 {
        left: 72%;
        top: 78%;
        animation-delay: 2s;
        animation-duration: 9.5s;
        font-size: 5px;
        color: var(--am-emerald);
      }
      .am-p8 {
        left: 82%;
        top: 60%;
        animation-delay: 0.6s;
        animation-duration: 6.5s;
        font-size: 8px;
      }
      .am-p9 {
        left: 90%;
        top: 72%;
        animation-delay: 1.8s;
        animation-duration: 11s;
        font-size: 6px;
        color: var(--am-emerald);
      }
      .am-p10 {
        left: 5%;
        top: 40%;
        animation-delay: 3s;
        animation-duration: 8s;
        font-size: 7px;
      }
      .am-p11 {
        left: 48%;
        top: 90%;
        animation-delay: 2.8s;
        animation-duration: 7s;
        font-size: 9px;
        color: var(--am-emerald);
      }
      .am-p12 {
        left: 93%;
        top: 45%;
        animation-delay: 1.4s;
        animation-duration: 10s;
        font-size: 6px;
      }

      @keyframes am-float {
        0% {
          transform: translateY(0) rotate(0deg);
          opacity: 0;
        }
        15% {
          opacity: 0.7;
        }
        85% {
          opacity: 0.5;
        }
        100% {
          transform: translateY(-120px) rotate(30deg);
          opacity: 0;
        }
      }

      .am-lantern {
        position: absolute;
        top: 5%;
        width: 40px;
        opacity: 0;
        animation:
          am-lantern-sway 4s ease-in-out infinite,
          am-fade-in 1.2s ease 0.5s forwards;
        will-change: transform;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.3));
      }
      .am-lantern svg {
        width: 100%;
        height: auto;
      }

      .am-lantern-l {
        left: clamp(20px, 8%, 80px);
        animation-name: am-lantern-sway, am-fade-in;
        animation-delay: 0.5s, 0.5s;
        transform-origin: top center;
      }
      .am-lantern-r {
        right: clamp(20px, 8%, 80px);
        animation-name: am-lantern-sway-r, am-fade-in;
        animation-delay: 1s, 0.5s;
        transform-origin: top center;
        filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.3));
      }

      @keyframes am-lantern-sway {
        0%,
        100% {
          transform: rotate(-5deg);
        }
        50% {
          transform: rotate(5deg);
        }
      }
      @keyframes am-lantern-sway-r {
        0%,
        100% {
          transform: rotate(5deg);
        }
        50% {
          transform: rotate(-5deg);
        }
      }
      @keyframes am-fade-in {
        to {
          opacity: 1;
        }
      }

      .am-center {
        position: relative;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding: 20px;
        text-align: center;
        animation: am-center-rise 1s cubic-bezier(0.2, 0.8, 0.4, 1) 0.1s both;
      }
      @keyframes am-center-rise {
        from {
          transform: translateY(24px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .am-moon-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        margin-bottom: 24px;
        animation: am-moon-rise 1.2s cubic-bezier(0.2, 0.8, 0.4, 1) 0.2s both;
      }
      .am-moon-glow {
        position: absolute;
        inset: -20px;
        border-radius: 50%;
        background: radial-gradient(
          circle,
          rgba(212, 175, 55, 0.18) 0%,
          transparent 70%
        );
        animation: am-glow-pulse 3s ease-in-out infinite;
        will-change: transform, opacity;
      }
      @keyframes am-glow-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
        }
      }
      .am-moon-svg {
        width: 100%;
        height: 100%;
        animation: am-moon-orbit 18s linear infinite;
        will-change: transform;
        filter: drop-shadow(0 0 12px rgba(212, 175, 55, 0.6))
          drop-shadow(0 0 30px rgba(212, 175, 55, 0.25));
      }
      @keyframes am-moon-orbit {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.03);
        }
        100% {
          transform: rotate(360deg) scale(1);
        }
      }
      @keyframes am-moon-rise {
        from {
          transform: translateY(-16px) scale(0.8);
          opacity: 0;
        }
        to {
          transform: translateY(0) scale(1);
          opacity: 1;
        }
      }

      .am-brand {
        margin-bottom: 18px;
        animation: am-brand-in 1s ease 0.5s both;
      }
      .am-brand-pre {
        display: block;
        font-family: "Cinzel", serif;
        font-size: clamp(11px, 2vw, 13px);
        font-weight: 400;
        letter-spacing: 0.35em;
        color: var(--am-emerald);
        text-transform: uppercase;
        margin-bottom: 8px;
        opacity: 0.9;
      }
      .am-brand-name {
        font-family: var(--am-font-display);
        font-size: clamp(32px, 7vw, 54px);
        font-weight: 700;
        letter-spacing: 0.12em;
        line-height: 1;
        background: linear-gradient(
          135deg,
          #f5e6a3 0%,
          #d4af37 35%,
          #fff8dc 55%,
          #b8860b 80%,
          #d4af37 100%
        );
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: am-shine 4s linear infinite;
        will-change: background-position;
      }
      @keyframes am-shine {
        0% {
          background-position: 0% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      .am-brand-tagline {
        font-family: var(--am-font-body);
        font-size: clamp(13px, 2.2vw, 16px);
        font-weight: 300;
        font-style: italic;
        color: var(--am-text-dim);
        letter-spacing: 0.15em;
        margin-top: 8px;
      }
      @keyframes am-brand-in {
        from {
          transform: translateY(12px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .am-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        width: 220px;
        margin-bottom: 22px;
        animation: am-brand-in 1s ease 0.7s both;
      }
      .am-div-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(212, 175, 55, 0.5),
          transparent
        );
      }
      .am-div-gem {
        font-size: 8px;
        color: var(--am-gold);
        opacity: 0.8;
        animation: am-gem-spin 6s linear infinite;
        display: inline-block;
        will-change: transform;
      }
      @keyframes am-gem-spin {
        0% {
          transform: rotate(0deg) scale(1);
        }
        50% {
          transform: rotate(180deg) scale(1.3);
        }
        100% {
          transform: rotate(360deg) scale(1);
        }
      }

      .am-progress-wrap {
        width: clamp(200px, 60vw, 280px);
        margin-bottom: 14px;
        animation: am-brand-in 1s ease 0.9s both;
      }
      .am-progress-track {
        position: relative;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 10px;
      }
      .am-progress-fill {
        height: 100%;
        width: 0%;
        border-radius: 10px;
        background: linear-gradient(90deg, var(--am-emerald), var(--am-gold));
        transition: width 0.3s ease;
        will-change: width;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
      }
      .am-progress-shimmer {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(255, 255, 255, 0.4) 50%,
          transparent 100%
        );
        background-size: 200% 100%;
        animation: am-shimmer 1.8s linear infinite;
        will-change: background-position;
      }
      @keyframes am-shimmer {
        0% {
          background-position: -200% center;
        }
        100% {
          background-position: 200% center;
        }
      }
      .am-progress-pct {
        display: block;
        text-align: right;
        font-family: var(--am-font-display);
        font-size: 11px;
        letter-spacing: 0.1em;
        color: var(--am-gold);
        opacity: 0.7;
      }

      .am-loading-text {
        font-family: var(--am-font-body);
        font-size: clamp(11px, 1.8vw, 13px);
        font-weight: 300;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--am-text-dim);
        display: flex;
        align-items: center;
        gap: 10px;
        animation: am-brand-in 1s ease 1.1s both;
      }
      .am-dot-pulse {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      .am-dot-pulse span {
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--am-emerald);
        animation: am-dot 1.4s ease-in-out infinite;
      }
      .am-dot-pulse span:nth-child(2) {
        animation-delay: 0.2s;
        background: var(--am-gold);
      }
      .am-dot-pulse span:nth-child(3) {
        animation-delay: 0.4s;
      }
      @keyframes am-dot {
        0%,
        80%,
        100% {
          transform: scale(0.6);
          opacity: 0.4;
        }
        40% {
          transform: scale(1);
          opacity: 1;
        }
      }

      @media (max-width: 480px) {
        .am-lantern {
          width: 28px;
        }
        .am-moon-wrap {
          width: 90px;
          height: 90px;
          margin-bottom: 18px;
        }
        .am-divider {
          width: 160px;
        }
        .am-progress-wrap {
          width: 220px;
        }
      }
      @media (max-height: 550px) {
        .am-lantern {
          display: none;
        }
        .am-moon-wrap {
          width: 70px;
          height: 70px;
          margin-bottom: 14px;
        }
      }
    </style>
  </head>
  <body>

    <script>
      (function () {
        var loader = document.getElementById("am-preloader");
        var bar = document.getElementById("am-bar");
        var pct = document.getElementById("am-pct");
        if (!loader) return;
        var progress = 0,
          target = 0,
          raf;

        function tick() {
          var step = Math.random() * 1.8 + 0.4;
          if (target < 30) step *= 2.2;
          else if (target < 60) step *= 1.4;
          else if (target < 85) step *= 0.8;
          else step *= 0.3;
          target = Math.min(target + step, 92);
          progress += (target - progress) * 0.08;
          var v = Math.floor(progress);
          if (bar) bar.style.width = progress + "%";
          if (pct) pct.textContent = v + "%";
          if (progress < 92) raf = requestAnimationFrame(tick);
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(tick);
        });

        function dismiss() {
          cancelAnimationFrame(raf);
          if (bar) bar.style.width = "100%";
          if (pct) pct.textContent = "100%";
          setTimeout(function () {
            loader.classList.add("am-hidden");
            setTimeout(function () {
              if (loader && loader.parentNode)
                loader.parentNode.removeChild(loader);
            }, 800);
          }, 320);
        }

        // Preview: auto-dismiss after 5s so user can see animation
        if (document.readyState === "complete") {
          setTimeout(dismiss, 3500);
        } else {
          window.addEventListener("load", function () {
            setTimeout(dismiss, 600);
          });
          setTimeout(dismiss, 5000);
        }
      })();
    </script>
  </body>
</html>
