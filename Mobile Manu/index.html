<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Navbar</title>
    <style>
      :root {
        --accent: #9b59ff;
        --text-dark: #000000;
        --bg-light: #ffffff;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
      }

      .menu-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 10001;
        background: var(--accent);
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }

      .mobile-nav {
        position: fixed;
        top: 0;
        right: -100%;
        width: 100%;
        height: 100vh;
        background: var(--bg-light);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        padding: 60px 30px;
        box-sizing: border-box;
        transition: 0.4s ease-in-out;
        overflow-y: auto;
      }

      .mobile-nav.active {
        right: 0;
      }

      .close-btn {
        position: absolute;
        top: 20px;
        right: 30px;
        font-size: 30px;
        background: none;
        border: none;
        cursor: pointer;
      }

      .mobile-links-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
        margin-top: 20px;
      }

      .mobile-link {
        text-decoration: none;
        font-size: 1.5rem;
        color: var(--text-dark);
        font-weight: 600;
        border-bottom: 1px solid #eee;
        padding-bottom: 10px;
      }

      .mobile-contact-info {
        margin-top: auto;
        padding-top: 40px;
        padding-bottom: 20px;
      }

      .mobile-contact-info h3 {
        font-size: 1.6rem;
        margin-bottom: 20px;
        display: inline-block;
        border-bottom: 3px solid var(--text-dark);
        padding-bottom: 5px;
      }

      .info-item {
        margin-bottom: 12px;
        font-size: 1.1rem;
        color: #333;
      }

      .info-item strong {
        font-weight: 800;
        color: var(--text-dark);
      }

      .menu-overlay-bg {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 9999;
      }
      .menu-overlay-bg.active {
        display: block;
      }
    </style>
  </head>
  <body>
    <button class="menu-btn" onclick="toggleMenu()">MENU</button>

    <div class="menu-overlay-bg" id="overlay" onclick="toggleMenu()"></div>

    <nav class="mobile-nav" id="mobileNav">
      <button class="close-btn" onclick="toggleMenu()">✕</button>

      <div class="mobile-links-container">
        <a href="#about" class="mobile-link">About</a>
        <a href="#services" class="mobile-link">Services</a>
        <a href="#skills" class="mobile-link">Skills</a>
        <a href="#projects" class="mobile-link">Projects</a>
        <a href="#testimonials" class="mobile-link">Reviews</a>
        <a href="#contact" class="mobile-link">Contact</a>
      </div>

      <div class="mobile-contact-info">
        <h3>Need Help?</h3>
        <div class="info-item">
          <strong>Address:</strong> Lahore Punjab, Pakistan
        </div>
        <div class="info-item">
          <strong>Email:</strong> anasakbarsaqi8@gmail.com
        </div>
        <div class="info-item"><strong>Phone:</strong> (+92) 324 8824 209</div>
      </div>
    </nav>

    <script>
      function toggleMenu() {
        const nav = document.getElementById("mobileNav");
        const overlay = document.getElementById("overlay");

        nav.classList.toggle("active");
        overlay.classList.toggle("active");
      }

      document.querySelectorAll(".mobile-link").forEach((link) => {
        link.addEventListener("click", () => {
          document.getElementById("mobileNav").classList.remove("active");
          document.getElementById("overlay").classList.remove("active");
        });
      });
    </script>
  </body>
</html>
