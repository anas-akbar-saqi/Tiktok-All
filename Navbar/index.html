<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fixed Ultra Modern Nav</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-body: #080808;
        --nav-bg: rgba(255, 255, 255, 0.05);
        --text-main: #ffffff;
        --accent: #9b59ff;
        --glass-border: rgba(255, 255, 255, 0.1);
        --blur: 15px;
      }

      [data-theme="light"] {
        --bg-body: #f5f5f7;
        --nav-bg: rgba(0, 0, 0, 0.05);
        --text-main: #1d1d1f;
        --accent: #6e00ff;
        --glass-border: rgba(0, 0, 0, 0.1);
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        transition: background 0.5s ease;
        height: 200vh;
      }

      /* Navbar Layout */
      .nav-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 90%;
        max-width: 1200px;
        z-index: 1000;
        transition: 0.4s ease;
      }

      nav {
        background: var(--nav-bg);
        backdrop-filter: blur(var(--blur));
        -webkit-backdrop-filter: blur(var(--blur));
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-weight: 700;
        font-size: 1.4rem;
        background: linear-gradient(90deg, var(--accent), #00f5ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Desktop Links */
      .nav-links {
        display: flex;
        gap: 30px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .nav-links a {
        text-decoration: none;
        color: var(--text-main);
        font-size: 0.95rem;
        opacity: 0.7;
        transition: 0.3s;
      }
      .nav-links a:hover {
        opacity: 1;
        color: var(--accent);
      }

      /* Mobile Menu Sidebar */
      .mobile-menu {
        position: fixed;
        top: 0;
        right: -100%; /* Hidden by default */
        width: 280px;
        height: 100vh;
        background: var(--bg-body);
        border-left: 1px solid var(--glass-border);
        z-index: 1001;
        transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
        display: flex;
        flex-direction: column;
        padding: 40px;
        gap: 20px;
      }

      .mobile-menu.active {
        right: 0;
      }

      .mobile-menu a {
        text-decoration: none;
        color: var(--text-main);
        font-size: 1.5rem;
        font-weight: 600;
      }

      /* Overlay Background */
      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        z-index: 1000;
      }
      .overlay.active {
        display: block;
        backdrop-filter: blur(4px);
      }

      /* Controls */
      .nav-controls {
        display: flex;
        align-items: center;
        gap: 15px;
      }
      .theme-btn {
        background: none;
        border: none;
        color: var(--text-main);
        cursor: pointer;
        font-size: 1.2rem;
      }

      .menu-toggle {
        display: none;
        font-size: 1.5rem;
        cursor: pointer;
        color: var(--text-main);
      }

      .close-btn {
        align-self: flex-end;
        font-size: 2rem;
        cursor: pointer;
      }

      @media (max-width: 768px) {
        .nav-links {
          display: none;
        }
        .menu-toggle {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="overlay"></div>

    <div class="nav-container" id="navbar">
      <nav>
        <div class="logo">ANAS.R</div>

        <ul class="nav-links">
          <li><a href="#">Home</a></li>
          <li><a href="#">Work</a></li>
          <li><a href="#">About</a></li>
        </ul>

        <div class="nav-controls">
          <button class="theme-btn" id="themeToggle">🌙</button>
          <div class="menu-toggle" id="openMenu">☰</div>
        </div>
      </nav>
    </div>

    <div class="mobile-menu" id="mobileMenu">
      <div class="close-btn" id="closeMenu">×</div>
      <a href="#">Home</a>
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#" style="color: var(--accent)">Contact</a>
    </div>

    <script>
      const openMenu = document.getElementById("openMenu");
      const closeMenu = document.getElementById("closeMenu");
      const mobileMenu = document.getElementById("mobileMenu");
      const overlay = document.getElementById("overlay");
      const themeToggle = document.getElementById("themeToggle");
      const html = document.documentElement;

      // 1. Mobile Toggle Logic
      const toggleMenu = () => {
        mobileMenu.classList.toggle("active");
        overlay.classList.toggle("active");
      };

      openMenu.addEventListener("click", toggleMenu);
      closeMenu.addEventListener("click", toggleMenu);
      overlay.addEventListener("click", toggleMenu);

      // 2. Theme Toggle Logic
      themeToggle.addEventListener("click", () => {
        const currentTheme = html.getAttribute("data-theme");
        const newTheme = currentTheme === "dark" ? "light" : "dark";
        html.setAttribute("data-theme", newTheme);
        themeToggle.innerText = newTheme === "dark" ? "🌙" : "☀️";
      });

      // 3. Scroll Shrink
      window.addEventListener("scroll", () => {
        const navbar = document.getElementById("navbar");
        if (window.scrollY > 50) {
          navbar.style.top = "10px";
          navbar.style.width = "95%";
        } else {
          navbar.style.top = "20px";
          navbar.style.width = "90%";
        }
      });
    </script>
  </body>
</html>
